events {}

http {
    # 1. Backend API (api.localhost)
    server {
        listen 80;
        server_name api.localhost;

        location / {
            proxy_pass http://host.docker.internal:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # 2. Frontend (localhost and app.localhost)
    server {
        listen 80;
        server_name localhost app.localhost;

        location / {
            proxy_pass http://host.docker.internal:5173; # Default Vite port
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Enable HMR for Vite
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}