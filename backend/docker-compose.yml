services:
  redis:
    image: redis:alpine
    container_name: drivio-cache
    ports:
      - "6379:6379"
    restart: no

  nginx:
    image: nginx:alpine
    container_name: drivio-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis